<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário de CEP</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input { padding: 8px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 8px 15px; background-color: #007BFF; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #0056b3; }
    </style>
</head>
<body>

    <h2>Cadastro de Endereço</h2>

    <div class="form-group">
        <label for="cep">CEP:</label>
        <input type="text" id="cep" placeholder="00000-000" maxlength="9">
        <button type="button" onclick="buscarCEP()">Buscar</button>
    </div>

    <div class="form-group">
        <label for="rua">Rua/Logradouro:</label>
        <input type="text" id="rua" readonly>
    </div>

    <div class="form-group">
        <label for="bairro">Bairro:</label>
        <input type="text" id="bairro" readonly>
    </div>

    <div class="form-group">
        <label for="cidade">Cidade:</label>
        <input type="text" id="cidade" readonly>
    </div>

    <div class="form-group">
        <label for="uf">Estado (UF):</label>
        <input type="text" id="uf" readonly>
    </div>

    <script src="CadastroExer.js"></script>
</body>
</html>
